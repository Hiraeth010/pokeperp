[toolchain]

[features]
resolution = true
skip-lint = false

[programs.localnet]
oracle = "GXEGbfvQvUh77udPyDYeVxgMZYd4BWLtu164dcLhqJ4i"
perp_engine = "Gtpv6K9Fi3pkYcYZEzqaS8DW2nqDwpwPf24Q1WxsQzsa"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[test]
# This Windows box is slow to unpack genesis + boot the validator; the 5s
# default times out ("Test validator does not look started"). Give it room.
startup_wait = 60000

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
