# Devnet publisher config — submits real eBay-derived prices to the live
# devnet oracle via the Oxylabs-backed scraper service.
#
# Run once (current day - 1):
#   pokeperp-publisher --config examples/publisher.devnet.toml run
#
# Dry run (computes + prints prices, skips the on-chain submission):
#   pokeperp-publisher --config examples/publisher.devnet.toml run --dry-run
#
# Crank (the Railway deployment): poll every 60s and submit + aggregate
# current_day-1 whenever that day isn't already on-chain. Idempotent no-op
# otherwise; reacts to UTC-midnight rollover within one interval. Unlike the
# `daemon` command, the crank also calls aggregate_day, so the index advances.
#   pokeperp-publisher --config examples/publisher.devnet.toml crank --interval-secs 60

[identity]
# Signing key resolution (see load_publisher_keypair in src/main.rs):
#   1. If the PUBLISHER_KEYPAIR_JSON env var is set (a solana-keygen byte array
#      as JSON), it is used directly — this is how the Railway `publisher-crank`
#      deployment injects the key as a secret, with no keypair file in the image.
#   2. Otherwise, fall back to `publisher_keypair_path` below (local dev, where
#      the key still lives on disk under devnet-keys/ — gitignored, untracked).
# Currently publisher-4. Earlier publishers (admin, pub-2, pub-3) had their day-
# 20599 PriceUpdate PDAs consumed; pub-4 is the slot the crank submits from.
publisher_keypair_path = "./devnet-keys/publisher-4.json"
publisher_pubkey = "HLqpyCARa14gG2QsXPNNfQNZVNwzPTZqKZjPag1RStid"

# rpc_url is env-overridable so the Helius (or any paid) endpoint can be injected
# as a secret instead of committing the API key. RPC_URL env wins; falls back to
# public devnet for local runs. The Railway publisher-crank service sets RPC_URL.
[oracle]
rpc_url = "${RPC_URL:-https://api.devnet.solana.com}"
oracle_program_id = "GXEGbfvQvUh77udPyDYeVxgMZYd4BWLtu164dcLhqJ4i"
commitment = "confirmed"

[methodology]
trim_top_pct = 10
trim_bottom_pct = 10
# Devnet single-publisher = no median across publishers, so we want enough
# samples that one outlier doesn't dominate. Bump if scraper consistently
# returns < 8 PSA 10 sales per query.
min_sample_size = 5
window_days_primary = 7
window_days_fallback = [14, 30]
stale_decay_pct_per_day = 0.5

[sources]
primary = "scraper"
secondary = []

# Scraper service URL. Set via env (SCRAPER_URL) or here.  Env wins.
[sources.scraper]
url = "https://pokeperps-production.up.railway.app"

[schedule]
submit_at_utc_hour = 22
submit_at_utc_minute = 0
retry_max_attempts = 3
retry_backoff_seconds = 60

[observability]
metrics_port = 9100
log_level = "info"
log_format = "plain"

[security]
allow_dry_run_only = false
require_sample_count_consistency = true
