# Railway build + deploy config for the Pokeperp keeper (funding + liquidation).
#
# Build: Nixpacks auto-detects Node from package.json; `tsx` runs the TS source
# directly (same as the indexer). This is a WORKER — no HTTP server, so no
# healthcheckPath; Railway keeps it alive via the restart policy.
#
# Required env vars (set in Railway dashboard → Variables):
#   RPC_URL              e.g. https://api.devnet.solana.com
#   KEEPER_KEYPAIR_JSON  the keeper signing key as a solana-keygen byte array
#                        (fee payer; receives the 1/3 liquidation penalty)
# Optional:
#   KEEPER_INTERVAL_MS   poll interval, default 60000
#   PERP_PROGRAM_ID      defaults to the devnet perp-engine ID

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
