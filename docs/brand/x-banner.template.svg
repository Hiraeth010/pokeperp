<!--
  Pokeperp X banner — 1500×500. Pokemon-foil-card aesthetic: layered radial
  glows, holographic sheen, scattered foil sparkles, an energy aura radiating
  from the engraved Pokeball mark.  Composition is biased to the right two-
  thirds so the bottom-left avatar overlay on X doesn't cover the hero.

  TEMPLATE: contains placeholders for three PMT50 hero card images (Rayquaza VMAX,
  Giratina V, Charizard ex). Run build-banner.ps1 to substitute real card photos
  from card-src/ and produce the final x-banner.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-label="Pokeperp — perp DEX trading against the PSA 10 Modern Top 50">
  <title>Pokeperp X banner</title>
  <defs>
    <!-- ===== Background ===== -->
    <!-- Deep cosmic gradient -->
    <linearGradient id="bg-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0B0B16"/>
      <stop offset="55%" stop-color="#15102A"/>
      <stop offset="100%" stop-color="#070710"/>
    </linearGradient>
    <!-- Warm red nebula behind the hero -->
    <radialGradient id="bg-glow-red" cx="0.66" cy="0.42" r="0.34">
      <stop offset="0%" stop-color="#FF4D4D" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF4D4D" stop-opacity="0"/>
    </radialGradient>
    <!-- Electric-yellow accent, smaller and offset to add temperature variation -->
    <radialGradient id="bg-glow-electric" cx="0.55" cy="0.28" r="0.18">
      <stop offset="0%" stop-color="#FFD56B" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFD56B" stop-opacity="0"/>
    </radialGradient>
    <!-- Cool psychic-purple wash on the left to balance the warm right -->
    <radialGradient id="bg-glow-violet" cx="0.20" cy="0.65" r="0.40">
      <stop offset="0%" stop-color="#6E3AF8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6E3AF8" stop-opacity="0"/>
    </radialGradient>

    <!-- Holographic sheen: a soft diagonal rainbow band drifting across the
         banner at low opacity.  This is the "foil card" signature — Pokemon
         holos catch a spectrum when tilted into light. -->
    <linearGradient id="holo-sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="10%"  stop-color="#FF6B6B" stop-opacity="0"/>
      <stop offset="32%"  stop-color="#FFD56B" stop-opacity="0.10"/>
      <stop offset="45%"  stop-color="#7EE787" stop-opacity="0.10"/>
      <stop offset="58%"  stop-color="#6890F0" stop-opacity="0.10"/>
      <stop offset="72%"  stop-color="#C77DFF" stop-opacity="0.10"/>
      <stop offset="90%"  stop-color="#FF6B6B" stop-opacity="0"/>
    </linearGradient>

    <!-- ===== Pokeball ingredient gradients ===== -->
    <linearGradient id="pp-red" x1="0.25" y1="0.05" x2="0.85" y2="0.95">
      <stop offset="0%" stop-color="#FF8A8A"/>
      <stop offset="25%" stop-color="#FF5757"/>
      <stop offset="65%" stop-color="#DC2535"/>
      <stop offset="100%" stop-color="#9C0E18"/>
    </linearGradient>
    <linearGradient id="pp-white" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F2F2F6"/>
      <stop offset="55%" stop-color="#D8D8E0"/>
      <stop offset="100%" stop-color="#8E8E9A"/>
    </linearGradient>
    <linearGradient id="pp-band" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1A1A24"/>
      <stop offset="50%" stop-color="#08080E"/>
      <stop offset="100%" stop-color="#1A1A24"/>
    </linearGradient>
    <radialGradient id="pp-shine" cx="0.36" cy="0.28" r="0.32">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pp-button" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#EAEAF0"/>
      <stop offset="100%" stop-color="#B8B8C4"/>
    </radialGradient>

    <!-- Hero aura: concentric soft glow behind the pokeball, suggesting energy
         radiating from a thrown ball.  Three stops to avoid a hard edge. -->
    <radialGradient id="hero-aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#FF6B6B" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#FFD56B" stop-opacity="0.20"/>
      <stop offset="65%" stop-color="#6E3AF8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Carve arc + red-half clip for engraving (reused) -->
    <path id="pp-carve-arc" d="M 110 200 Q 256 80 402 200" fill="none"/>
    <clipPath id="pp-red-clip">
      <path d="M256 32 a224 224 0 0 1 222.88 196 H339.2 a84 84 0 0 0 -166.4 0 H33.12 A224 224 0 0 1 256 32 z"/>
    </clipPath>

    <!-- Foil sparkle: classic 4-point asterisk star, reused as <use> with different
         scale + opacity for variety.  Drawn around (0,0) so the use's x/y is its
         center. -->
    <g id="sparkle">
      <path d="M0 -10 L1.6 -1.6 L10 0 L1.6 1.6 L0 10 L-1.6 1.6 L-10 0 L-1.6 -1.6 Z" fill="#FFFFFF"/>
      <circle r="1.4" fill="#FFFFFF"/>
    </g>

    <!-- ===== PSA-slab silhouette (180×250 native) — the iconic red PSA header
         + plastic case body. The card window is filled per-instance with a real
         card photo (base64-embedded by build-banner.ps1). ===== -->
    <g id="psa-frame">
      <!-- Plastic case body -->
      <rect width="180" height="250" rx="8" fill="#F8F6F0" stroke="#D5D3CD" stroke-width="1.5"/>
      <!-- Top red PSA banner -->
      <rect x="6" y="6" width="168" height="38" rx="3" fill="#C8102E"/>
      <text x="90" y="26" font-family="Impact, 'Arial Black', sans-serif" font-size="17" fill="#FFFFFF"
            text-anchor="middle" font-weight="900" letter-spacing="2">PSA</text>
      <text x="90" y="40" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7.5" fill="#FFFFFF"
            text-anchor="middle" letter-spacing="1.5" font-weight="700">GEM MINT 10</text>
    </g>
    <!-- Slab bottom-overlay (barcode strip only). Drawn AFTER the card image
         so it sits on top of the card at the bottom of the slab. -->
    <g id="psa-overlay">
      <rect x="20" y="234" width="140" height="11" fill="#FFFFFF" stroke="#D5D3CD" stroke-width="0.5"/>
      <g transform="translate(26 236)" fill="#000">
        <rect              width="1" height="7"/>
        <rect x="3"        width="1" height="7"/>
        <rect x="6"        width="2" height="7"/>
        <rect x="11"       width="1" height="7"/>
        <rect x="14"       width="2" height="7"/>
        <rect x="19"       width="1" height="7"/>
        <rect x="22"       width="1" height="7"/>
        <rect x="26"       width="2" height="7"/>
        <rect x="31"       width="1" height="7"/>
        <rect x="34"       width="1" height="7"/>
        <rect x="37"       width="2" height="7"/>
        <rect x="42"       width="1" height="7"/>
        <rect x="46"       width="1" height="7"/>
        <rect x="49"       width="2" height="7"/>
      </g>
    </g>

    <!-- Subtle drop shadow under the hero -->
    <filter id="lift" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="12" in="SourceAlpha"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Tagline underline gradient -->
    <linearGradient id="tag-underline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF6B6B" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#FFD56B" stop-opacity="0.55"/>
      <stop offset="65%"  stop-color="#FFD56B" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </linearGradient>

    <!-- Corner vignette -->
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- ===== 1. Backdrop stack ===== -->
  <rect width="1500" height="500" fill="url(#bg-base)"/>
  <rect width="1500" height="500" fill="url(#bg-glow-violet)"/>
  <rect width="1500" height="500" fill="url(#bg-glow-red)"/>
  <rect width="1500" height="500" fill="url(#bg-glow-electric)"/>

  <!-- Holographic sheen, a diagonal foil band -->
  <rect width="1500" height="500" fill="url(#holo-sheen)" opacity="0.7"/>

  <!-- ===== 2. PSA-slab cards — three of them framing the hero. =====
       Real card art from pokemontcg.io's CDN, base64-embedded so the SVG is
       self-contained when X rasterises it.  Card image rect (26,48, 128×180)
       gives ≈0.711 aspect ratio, close to the real PSA holder's 5:7 card window. -->
  <g aria-hidden="true">
    <!-- Slab 1: top-left, tilted left, partial bleed off the top edge —
         Rayquaza VMAX AA (Evolving Skies). -->
    <g transform="translate(80 -10) rotate(-16) scale(1.0)" opacity="0.85">
      <use href="#psa-frame"/>
      <image x="26" y="48" width="128" height="180" preserveAspectRatio="xMidYMid slice"
             href="__CARD_RAYQUAZA__"/>
      <use href="#psa-overlay"/>
    </g>
    <!-- Slab 2: top-right, tilted right — Giratina V AA (Lost Origin). -->
    <g transform="translate(1290 -25) rotate(14) scale(1.0)" opacity="0.85">
      <use href="#psa-frame"/>
      <image x="26" y="48" width="128" height="180" preserveAspectRatio="xMidYMid slice"
             href="__CARD_GIRATINA__"/>
      <use href="#psa-overlay"/>
    </g>
    <!-- Slab 3: upper-left-center, between the avatar zone and the hero —
         Charizard ex SIR (Pokemon 151).  Sits in the upper half of the banner
         so its vertical span is well above the tagline at y=420 (slab bottom
         is at ~y=250 here).  Slight right-tilt for variety vs the other two
         slabs (left-tilted Rayquaza + right-tilted Giratina + right-tilted
         Charizard reads as three independent cards rather than mirrored pairs). -->
    <g transform="translate(420 20) rotate(8) scale(0.88)" opacity="0.85">
      <use href="#psa-frame"/>
      <image x="26" y="48" width="128" height="180" preserveAspectRatio="xMidYMid slice"
             href="__CARD_CHARIZARD__"/>
      <use href="#psa-overlay"/>
    </g>
  </g>

  <!-- ===== 3. Foil sparkles ===== -->
  <!-- 7 sparkles, positioned between the slabs and around the hero, avoiding the avatar zone. -->
  <g aria-hidden="true">
    <use href="#sparkle" transform="translate(540 200) scale(1.2)" opacity="0.85"/>
    <use href="#sparkle" transform="translate(720 80)  scale(0.7)" opacity="0.7"/>
    <use href="#sparkle" transform="translate(1180 80) scale(0.9)" opacity="0.8"/>
    <use href="#sparkle" transform="translate(1100 410) scale(1.0)" opacity="0.85"/>
    <use href="#sparkle" transform="translate(820 410) scale(0.7)" opacity="0.65"/>
    <use href="#sparkle" transform="translate(650 250) scale(0.8)" opacity="0.85" fill="#FFD56B"/>
    <use href="#sparkle" transform="translate(1260 220) scale(0.6)" opacity="0.7"  fill="#FFD56B"/>
  </g>

  <!-- ===== 4. Hero aura behind the pokeball ===== -->
  <ellipse cx="950" cy="220" rx="380" ry="320" fill="url(#hero-aura)"/>

  <!-- ===== 5. Hero: engraved Pokeball mark ===== -->
  <g filter="url(#lift)">
    <g transform="translate(770 20) scale(0.7)">
      <!-- Top red half -->
      <path
        d="M256 32 a224 224 0 0 1 222.88 196 H339.2 a84 84 0 0 0 -166.4 0 H33.12 A224 224 0 0 1 256 32 z"
        fill="url(#pp-red)"/>
      <!-- Bottom white half -->
      <path
        d="M256 480 a224 224 0 0 1 -222.88 -196 H172.8 a84 84 0 0 0 166.4 0 H478.88 A224 224 0 0 1 256 480 z"
        fill="url(#pp-white)"/>
      <!-- Engraved wordmark -->
      <g clip-path="url(#pp-red-clip)"
         font-family="'Russo One', Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
         font-weight="900"
         font-size="62"
         letter-spacing="3"
         text-anchor="middle">
        <text fill="#000000" fill-opacity="0.55" transform="translate(0,-2.5)">
          <textPath href="#pp-carve-arc" startOffset="50%">PokePerp</textPath>
        </text>
        <text fill="#FFE2DE" fill-opacity="0.45" transform="translate(0,2.5)">
          <textPath href="#pp-carve-arc" startOffset="50%">PokePerp</textPath>
        </text>
        <text fill="#5C0610" fill-opacity="0.55">
          <textPath href="#pp-carve-arc" startOffset="50%">PokePerp</textPath>
        </text>
      </g>
      <!-- Band -->
      <path
        d="M33.12 228 H172.8 a84 84 0 0 1 166.4 0 H478.88 a224.5 224.5 0 0 1 0 56 H339.2 a84 84 0 0 1 -166.4 0 H33.12 a224.5 224.5 0 0 1 0 -56 z"
        fill="url(#pp-band)"/>
      <!-- Button -->
      <circle cx="256" cy="256" r="60" fill="#08080E"/>
      <circle cx="256" cy="256" r="38" fill="url(#pp-button)"/>
      <circle cx="242" cy="242" r="6" fill="#FFFFFF" opacity="0.9"/>
      <!-- Glassy highlight -->
      <path
        d="M256 32 a224 224 0 0 1 222.88 196 H339.2 a84 84 0 0 0 -166.4 0 H33.12 A224 224 0 0 1 256 32 z"
        fill="url(#pp-shine)"/>
    </g>
  </g>

  <!-- ===== 6. Tagline ===== -->
  <text x="950" y="420"
        xml:space="preserve"
        font-family="'Russo One', Impact, 'Helvetica Neue', sans-serif"
        font-weight="500"
        font-size="38"
        letter-spacing="2"
        text-anchor="middle"
        fill="#D8D8E6">
    <tspan>Perp Dex Trading Against the</tspan><tspan fill="#FFFFFF" font-weight="700">&#160;PSA 10 MODERN TOP 25</tspan>
  </text>

  <!-- Tagline underline glint -->
  <rect x="540" y="438" width="820" height="1.5" fill="url(#tag-underline)"/>

  <!-- ===== 7. Vignette ===== -->
  <rect width="1500" height="500" fill="url(#vignette)" pointer-events="none"/>
</svg>
