<!--
  Pokeperp X profile icon — the engraved Pokeball mark composited onto the same
  cosmic-foil background as x-banner.svg, so the avatar and banner read as a
  matched set on the X profile.

  Pokeball is scaled to ~78% of the inscribed avatar circle so a generous ring
  of background (with sparkles + holographic sheen) remains visible around it
  after X's circular crop.  Background gradients, aura colors, and sparkle
  glyphs are identical to the banner.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="PokePerp">
  <title>PokePerp</title>
  <defs>
    <!-- ===== Background (matched to x-banner.svg) ===== -->
    <linearGradient id="bg-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0B0B16"/>
      <stop offset="55%" stop-color="#15102A"/>
      <stop offset="100%" stop-color="#070710"/>
    </linearGradient>
    <radialGradient id="bg-glow-red" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#FF4D4D" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#FF4D4D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow-electric" cx="0.32" cy="0.20" r="0.30">
      <stop offset="0%" stop-color="#FFD56B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFD56B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow-violet" cx="0.78" cy="0.80" r="0.40">
      <stop offset="0%" stop-color="#6E3AF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6E3AF8" stop-opacity="0"/>
    </radialGradient>

    <!-- Holographic foil sheen — same spectrum as the banner -->
    <linearGradient id="holo-sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="10%"  stop-color="#FF6B6B" stop-opacity="0"/>
      <stop offset="32%"  stop-color="#FFD56B" stop-opacity="0.12"/>
      <stop offset="45%"  stop-color="#7EE787" stop-opacity="0.12"/>
      <stop offset="58%"  stop-color="#6890F0" stop-opacity="0.12"/>
      <stop offset="72%"  stop-color="#C77DFF" stop-opacity="0.12"/>
      <stop offset="90%"  stop-color="#FF6B6B" stop-opacity="0"/>
    </linearGradient>

    <!-- Hero aura — same warm→cool falloff as the banner, sized for the icon -->
    <radialGradient id="hero-aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#FF6B6B" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#FFD56B" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#6E3AF8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== Pokeball ingredient gradients ===== -->
    <linearGradient id="pp-red" x1="0.25" y1="0.05" x2="0.85" y2="0.95">
      <stop offset="0%" stop-color="#FF8A8A"/>
      <stop offset="25%" stop-color="#FF5757"/>
      <stop offset="65%" stop-color="#DC2535"/>
      <stop offset="100%" stop-color="#9C0E18"/>
    </linearGradient>
    <linearGradient id="pp-white" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F2F2F6"/>
      <stop offset="55%" stop-color="#D8D8E0"/>
      <stop offset="100%" stop-color="#8E8E9A"/>
    </linearGradient>
    <linearGradient id="pp-band" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1A1A24"/>
      <stop offset="50%" stop-color="#08080E"/>
      <stop offset="100%" stop-color="#1A1A24"/>
    </linearGradient>
    <radialGradient id="pp-shine" cx="0.36" cy="0.28" r="0.32">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pp-bottom-shade" cx="0.5" cy="0.85" r="0.45">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pp-button" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#EAEAF0"/>
      <stop offset="100%" stop-color="#B8B8C4"/>
    </radialGradient>
    <radialGradient id="pp-rim-light" cx="0.78" cy="0.18" r="0.30">
      <stop offset="0%" stop-color="#FFD56B" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#FFD56B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFD56B" stop-opacity="0"/>
    </radialGradient>

    <!-- Carve arc + red-half clip for engraving -->
    <path id="pp-carve-arc" d="M 110 200 Q 256 80 402 200" fill="none"/>
    <clipPath id="pp-red-clip">
      <path d="M256 32 a224 224 0 0 1 222.88 196 H339.2 a84 84 0 0 0 -166.4 0 H33.12 A224 224 0 0 1 256 32 z"/>
    </clipPath>

    <!-- Pokeball drop shadow so it floats above the background -->
    <filter id="pp-lift" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="10" in="SourceAlpha"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle radial vignette darkening the avatar edges (after X's circular crop) -->
    <radialGradient id="icon-vignette" cx="0.5" cy="0.5" r="0.5">
      <stop offset="78%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- ===== 1. Background stack (matches banner) ===== -->
  <rect width="512" height="512" fill="url(#bg-base)"/>
  <rect width="512" height="512" fill="url(#bg-glow-violet)"/>
  <rect width="512" height="512" fill="url(#bg-glow-red)"/>
  <rect width="512" height="512" fill="url(#bg-glow-electric)"/>
  <rect width="512" height="512" fill="url(#holo-sheen)" opacity="0.75"/>

  <!-- ===== 2. Hero aura behind the pokeball ===== -->
  <ellipse cx="256" cy="256" rx="240" ry="220" fill="url(#hero-aura)"/>

  <!-- ===== 3. Pokeball mark, scaled to ~78% of the inscribed avatar circle ===== -->
  <!-- Scale 0.80 from original paths: r=224 * 0.8 = 179.2 → leaves ~77px of
       visible background ring inside the avatar circle. -->
  <g filter="url(#pp-lift)" transform="translate(51.2 51.2) scale(0.80)">
    <!-- Top red half -->
    <path
      d="M256 32 a224 224 0 0 1 222.88 196 H339.2 a84 84 0 0 0 -166.4 0 H33.12 A224 224 0 0 1 256 32 z"
      fill="url(#pp-red)"/>
    <!-- Bottom white half -->
    <path
      d="M256 480 a224 224 0 0 1 -222.88 -196 H172.8 a84 84 0 0 0 166.4 0 H478.88 A224 224 0 0 1 256 480 z"
      fill="url(#pp-white)"/>
    <!-- Soft bottom shadow on the white half -->
    <path
      d="M256 480 a224 224 0 0 1 -222.88 -196 H172.8 a84 84 0 0 0 166.4 0 H478.88 A224 224 0 0 1 256 480 z"
      fill="url(#pp-bottom-shade)"/>
    <!-- Engraved "PokePerp" -->
    <g clip-path="url(#pp-red-clip)"
       font-family="'Russo One', Impact, 'Arial Black', 'Helvetica Neue', sans-serif"
       font-weight="900"
       font-size="62"
       letter-spacing="3"
       text-anchor="middle">
      <text fill="#000000" fill-opacity="0.55" transform="translate(0,-2.5)">
        <textPath href="#pp-carve-arc" startOffset="50%">PokePerp</textPath>
      </text>
      <text fill="#FFE2DE" fill-opacity="0.45" transform="translate(0,2.5)">
        <textPath href="#pp-carve-arc" startOffset="50%">PokePerp</textPath>
      </text>
      <text fill="#5C0610" fill-opacity="0.55">
        <textPath href="#pp-carve-arc" startOffset="50%">PokePerp</textPath>
      </text>
    </g>
    <!-- Band -->
    <path
      d="M33.12 228 H172.8 a84 84 0 0 1 166.4 0 H478.88 a224.5 224.5 0 0 1 0 56 H339.2 a84 84 0 0 1 -166.4 0 H33.12 a224.5 224.5 0 0 1 0 -56 z"
      fill="url(#pp-band)"/>
    <!-- Button -->
    <circle cx="256" cy="256" r="60" fill="#08080E"/>
    <circle cx="256" cy="256" r="38" fill="url(#pp-button)"/>
    <circle cx="242" cy="242" r="6" fill="#FFFFFF" opacity="0.9"/>
    <!-- Glassy highlight -->
    <path
      d="M256 32 a224 224 0 0 1 222.88 196 H339.2 a84 84 0 0 0 -166.4 0 H33.12 A224 224 0 0 1 256 32 z"
      fill="url(#pp-shine)"/>
    <!-- Warm rim-light glint -->
    <circle cx="256" cy="256" r="224" fill="url(#pp-rim-light)"/>
  </g>

  <!-- ===== 5. Soft vignette inside the avatar circle ===== -->
  <rect width="512" height="512" fill="url(#icon-vignette)" pointer-events="none"/>
</svg>
